# LLM 模型与提供商配置（业务层仅通过 services.llm.invoker 访问）
default_model_id: stepfun-ai/step-3.5-flash
# 识图/群审图专用（与文字聊天模型分离，不会改写用户菜单里选的模型）
default_vision_model_id: nvidia/nemotron-nano-12b-v2-vl:free

providers:
  nvidia:
    kind: openai_chat
    base_url: https://integrate.api.nvidia.com/v1/chat/completions
    api_key_env: NVIDIA_API_KEY
    label: NVIDIA
  openrouter:
    kind: openai_chat
    base_url: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    label: OpenRouter
    extra_headers:
      HTTP-Referer: https://github.com/gemini-tg-bot
      X-Title: Gemini Telegram Bot
  gemini:
    kind: gemini
    api_key_env: GEMINI_API_KEY
    label: Gemini

# 推理参数模板（NVIDIA 等 OpenAI 兼容接口）
inference_profiles:
  stepfun_default:
    max_tokens: 16384
    temperature: 1.0
    top_p: 0.9
  glm_thinking:
    max_tokens: 16384
    temperature: 1.0
    top_p: 1.0
    chat_template_kwargs:
      enable_thinking: true
      clear_thinking: false
  minimax_default:
    max_tokens: 8192
    temperature: 1.0
    top_p: 0.95
  nemotron_thinking:
    max_tokens: 16384
    temperature: 1.0
    top_p: 0.95
    chat_template_kwargs:
      thinking: true
    reasoning_budget: 16384
  gpt_oss_default:
    max_tokens: 4096
    temperature: 1.0
    top_p: 1.0
  qwen_next_default:
    max_tokens: 4096
    temperature: 0.6
    top_p: 0.7
  deepseek_v4_thinking:
    max_tokens: 16384
    temperature: 1.0
    top_p: 0.95
    chat_template_kwargs:
      thinking: true
      reasoning_effort: high
  kimi_thinking:
    max_tokens: 16384
    temperature: 1.0
    top_p: 1.0
    chat_template_kwargs:
      thinking: true
  openrouter_default:
    max_tokens: 768

menus:
  gemini:
    title: Gemini 模型
    exact_callbacks: true
  nvidia:
    title: NVIDIA 模型
    callback_prefix: nvidia_
  openrouter:
    title: OpenRouter 模型
    callback_prefix: openrouter_

models:
  # --- Gemini ---
  - id: gemini-3-pro-preview
    key: gemini_3_pro
    provider: gemini
    menu: gemini
    callback: gemini_3_pro
    display_name: Gemini 3 Pro
    button_label: Gemini 3 Pro
    capabilities: [chat, vision]
  - id: gemini-2.0-flash-exp
    key: gemini_2_flash
    provider: gemini
    menu: gemini
    callback: gemini_2_flash
    display_name: Gemini 2.0 Flash
    button_label: Gemini 2.0 Flash
    capabilities: [chat, vision]
  - id: gemini-1.5-pro
    key: gemini_1_5_pro
    provider: gemini
    menu: gemini
    callback: gemini_1_5_pro
    display_name: Gemini 1.5 Pro
    button_label: Gemini 1.5 Pro
    capabilities: [chat, vision]

  # --- NVIDIA ---
  - id: stepfun-ai/step-3.5-flash
    key: step_3_5_flash
    provider: nvidia
    menu: nvidia
    display_name: Step 3.5 Flash
    button_label: "⚡ Step 3.5 Flash (推荐)"
    capabilities: [chat, stream, tools]
    inference_profile: stepfun_default
  - id: z-ai/glm4.7
    key: glm_4_7
    provider: nvidia
    menu: nvidia
    display_name: GLM 4.7
    button_label: "🧠 GLM 4.7"
    capabilities: [chat, stream, tools]
    inference_profile: glm_thinking
  - id: minimaxai/minimax-m2.7
    key: minimax_m2_7
    provider: nvidia
    menu: nvidia
    display_name: MiniMax M2.7
    button_label: "🎭 MiniMax M2.7"
    capabilities: [chat, stream, tools]
    inference_profile: minimax_default
  - id: nvidia/nemotron-3-super-120b-a12b
    key: nemotron_3_super
    provider: nvidia
    menu: nvidia
    display_name: Nemotron 3 Super
    button_label: "🛡️ Nemotron 3 Super"
    capabilities: [chat, stream, tools]
    inference_profile: nemotron_thinking
  - id: openai/gpt-oss-120b
    key: gpt_oss_120b
    provider: nvidia
    menu: nvidia
    display_name: GPT-OSS 120B
    button_label: "🔷 GPT-OSS 120B"
    capabilities: [chat, stream, tools]
    inference_profile: gpt_oss_default
  - id: qwen/qwen3-next-80b-a3b-instruct
    key: qwen3_next
    provider: nvidia
    menu: nvidia
    display_name: Qwen3 Next 80B
    button_label: "🐉 Qwen3 Next 80B"
    capabilities: [chat, stream, tools]
    inference_profile: qwen_next_default
  - id: moonshotai/kimi-k2.6
    key: kimi_k2_6
    provider: nvidia
    menu: nvidia
    display_name: Kimi K2.6
    button_label: "🌙 Kimi K2.6"
    capabilities: [chat, stream, tools]
    inference_profile: kimi_thinking
  - id: deepseek-ai/deepseek-v4-flash
    key: deepseek_v4_flash
    provider: nvidia
    menu: nvidia
    display_name: DeepSeek V4 Flash
    button_label: "🐳 DeepSeek V4 Flash"
    capabilities: [chat, stream, tools]
    inference_profile: deepseek_v4_thinking
  - id: z-ai/glm-5.1
    key: glm_5_1
    provider: nvidia
    menu: nvidia
    display_name: GLM 5.1
    button_label: "🧠 GLM 5.1"
    capabilities: [chat, stream, tools]
    inference_profile: glm_thinking

  # --- OpenRouter 免费模型见 models/openrouter_free_models.yaml（scripts/sync_openrouter_free_models.py 生成）---
